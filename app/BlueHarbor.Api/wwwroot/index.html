<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlueHarbor - Accesso</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css?v=issue-09" />
</head>
<body>
  <header>
    <h1>BlueHarbor</h1>
    <span class="day">Registro operativo terminal</span>
  </header>

  <main>
    <section class="panel login-panel">
      <h2>Accesso</h2>
      <p id="login-error" class="msg" hidden>Credenziali non corrette.</p>

      <form id="form-login" method="post" action="/login">
        <input id="return-url" name="returnUrl" type="hidden" value="" />

        <label>Nome utente
          <input name="username" type="text" autocomplete="username" required autofocus />
        </label>

        <label>Password
          <input name="password" type="password" autocomplete="current-password" required />
        </label>

        <div class="form-actions">
          <button type="submit">Accedi</button>
        </div>
      </form>
    </section>
  </main>

  <button id="btn-theme" class="icon-button theme-toggle-floating" type="button" title="Cambia tema chiaro/scuro" aria-label="Cambia tema chiaro/scuro">&#127769;</button>

  <script src="toast.js"></script>
  <script src="support.js"></script>
  <script src="login.js"></script>
</body>
</html>
