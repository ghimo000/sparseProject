<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlueHarbor - Calendario storico</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css?v=issue-09" />
</head>
<body class="operational-page">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-close-row">
        <button id="btn-sidebar-close" class="icon-button theme-toggle" type="button" title="Nascondi menu" aria-label="Nascondi menu"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 6 9 12 15 18"></polyline></svg></button>
      </div>

      <div class="sidebar-brand">
        <span class="brand-mark" aria-hidden="true">BH</span>
        <div>
          <h1>BlueHarbor</h1>
          <span>Terminal operations</span>
        </div>
      </div>

      <span class="sidebar-role">Calendario</span>

      <div class="sidebar-date">
        Oggi
        <strong id="current-date">-</strong>
      </div>

      <nav class="sidebar-nav">
        <a id="nav-back" href="#" hidden></a>
        <a href="calendar.html" class="active">Calendario storico</a>
      </nav>

      <div class="sidebar-footer">
        <button id="btn-theme" class="icon-button theme-toggle" type="button" title="Cambia tema chiaro/scuro" aria-label="Cambia tema chiaro/scuro">&#127769;</button>
      </div>
    </aside>

    <div class="content">
      <div class="content-header">
        <div class="header-title">
          <button id="btn-sidebar-toggle" class="icon-button secondary" type="button" title="Mostra menu" aria-label="Mostra menu" hidden><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg></button>
          <button id="btn-back-icon" class="icon-button secondary" type="button" title="Torna indietro" aria-label="Torna indietro" hidden><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
          <h1>Calendario storico</h1>
        </div>
        <div class="header-actions">
          <button id="btn-logout" class="logout-btn" type="button">Logout</button>
        </div>
      </div>

      <section class="panel">
        <div class="calendar-header">
          <div class="calendar-nav">
            <button id="btn-prev-month" class="secondary" type="button">&larr; Mese prec.</button>
            <h3 id="calendar-month-label">-</h3>
            <button id="btn-next-month" class="secondary" type="button">Mese succ. &rarr;</button>
          </div>
          <button id="btn-today" class="secondary" type="button">Vai a oggi</button>
        </div>

        <div class="calendar-weekdays">
          <span class="calendar-weekday">Lun</span>
          <span class="calendar-weekday">Mar</span>
          <span class="calendar-weekday">Mer</span>
          <span class="calendar-weekday">Gio</span>
          <span class="calendar-weekday">Ven</span>
          <span class="calendar-weekday">Sab</span>
          <span class="calendar-weekday">Dom</span>
        </div>

        <div id="calendar-grid" class="calendar-grid"></div>

        <div class="calendar-legend">
          <span><span class="calendar-dot arrival"></span> Arrivi</span>
          <span><span class="calendar-dot departure"></span> Partenze</span>
        </div>
      </section>

      <section class="panel">
        <h2 id="detail-title">Seleziona un giorno</h2>

        <h3>Stato banchine</h3>
        <div id="detail-berths" class="berth-status-grid"></div>

        <h3>Arrivi</h3>
        <ul id="detail-arrivals" class="calendar-detail-list"></ul>

        <h3>Partenze</h3>
        <ul id="detail-departures" class="calendar-detail-list"></ul>

      </section>
    </div>
  </div>

  <div id="logout-dialog" class="dialog-overlay" hidden>
    <div class="dialog-panel" role="alertdialog" aria-labelledby="logout-dialog-title">
      <h3 id="logout-dialog-title">Conferma uscita</h3>
      <p>Vuoi davvero uscire da BlueHarbor?</p>
      <div class="dialog-actions">
        <button id="btn-logout-cancel" class="secondary" type="button">Annulla</button>
        <form method="post" action="/logout">
          <button class="danger" type="submit">Esci</button>
        </form>
      </div>
    </div>
  </div>

  <script src="dates.js"></script>
  <script src="api.js"></script>
  <script src="toast.js"></script>
  <script src="sidebar.js"></script>
  <script src="logout.js"></script>
  <script src="support.js"></script>
  <script src="calendar.js"></script>
</body>
</html>
